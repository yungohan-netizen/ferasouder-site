backend:
  name: github
  repo: yungohan-netizen/ferasouder-site
  branch: main
  base_url: https://ferasouderfils.be
  auth_endpoint: /api/auth

site_url: https://ferasouderfils.be
display_url: https://ferasouderfils.be

media_folder: images/uploads
public_folder: /images/uploads

locale: fr

# ─── COLLECTIONS ───────────────────────────────────────────────────────────────

collections:

  # ── Paramètres généraux du site ─────────────────────────────────────────────
  - name: settings
    label: "⚙️ Paramètres du site"
    files:
      - name: site_settings
        label: Paramètres généraux
        file: content/site-settings.json
        format: json
        fields:
          - { label: "Nom du site",        name: site_name,    widget: string }
          - { label: "Tagline",             name: tagline,      widget: string }
          - { label: "Email de contact",    name: email,        widget: string }
          - { label: "Téléphone",           name: phone,        widget: string, required: false }
          - { label: "Adresse",             name: address,      widget: string, required: false }
          - { label: "URL Instagram",       name: instagram,    widget: string, required: false }
          - { label: "URL Facebook",        name: facebook,     widget: string, required: false }

  # ── Contenu page d'accueil ──────────────────────────────────────────────────
  - name: home
    label: "🏠 Page d'accueil"
    files:
      - name: home_content
        label: Contenu accueil
        file: content/home.json
        format: json
        fields:
          - label: "Hero"
            name: hero
            widget: object
            fields:
              - { label: "Titre principal (ligne 1)", name: line1, widget: string }
              - { label: "Titre principal (ligne 2)", name: line2, widget: string }
              - { label: "Sous-titre / accroche",     name: tagline, widget: string }
              - { label: "Texte bouton principal",    name: cta_primary, widget: string }
              - { label: "Texte bouton secondaire",   name: cta_secondary, widget: string }

          - label: "Section Manifeste"
            name: manifeste
            widget: object
            fields:
              - { label: "Titre",      name: title,   widget: string }
              - { label: "Paragraphe", name: body,    widget: text }

          - label: "Section À propos / Processus"
            name: processus
            widget: object
            fields:
              - { label: "Titre",      name: title,   widget: string }
              - { label: "Paragraphe", name: body,    widget: text }

          - label: "Statistiques"
            name: stats
            widget: list
            fields:
              - { label: "Valeur (ex: 15 ou 100%)", name: value,  widget: string }
              - { label: "Label",                    name: label,  widget: string }

          - label: "Citation atelier"
            name: quote
            widget: object
            fields:
              - { label: "Texte de la citation", name: text,   widget: text }
              - { label: "Auteur",               name: author, widget: string }

  # ── Projets / Galeries ──────────────────────────────────────────────────────
  - name: projects
    label: "🖼️ Réalisations"
    files:
      - name: projects_list
        label: Liste des réalisations
        file: content/projects.json
        format: json
        fields:
          - label: Réalisations
            name: projects
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: "Titre",       name: title,    widget: string }
              - { label: "Catégorie",   name: cat,      widget: string,
                  hint: "Ex: Ferronnerie, Mobilier, Sculpture…" }
              - { label: "Sous-titre",  name: subtitle, widget: string, required: false }
              - { label: "Description", name: desc,     widget: text,   required: false }
              - { label: "Lieu",        name: location, widget: string, required: false }

              - label: "Image principale (miniature)"
                name: cover
                widget: image

              - label: "Photos de la galerie"
                name: images
                widget: list
                fields:
                  - { label: "Photo",   name: src,     widget: image }
                  - { label: "Légende", name: caption, widget: string, required: false }
                  - { label: "Alt",     name: alt,     widget: string, required: false }

              - label: "Visible sur le site"
                name: published
                widget: boolean
                default: true
